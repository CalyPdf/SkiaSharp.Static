name: Setup action (Linux)
description: Setup build action for Linux
inputs:
  arch:
    description: "Architecture: x64 or arm64"
    required: true
runs:
  using: "composite"
  steps:
    - uses: hustcer/setup-nu@main
      with:
        version: "*"

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Setup depot tools
      uses: 2ndlab/actions/setup-depot-tools@main

    - name: Install clang-21 and Linux build deps
      shell: bash
      run: |
        set -euxo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          wget gnupg software-properties-common ca-certificates lsb-release
        # apt.llvm.org noble-21 repo
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
        echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" \
          | sudo tee /etc/apt/sources.list.d/llvm-21.list
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          clang-21 lld-21 libfontconfig1-dev libfreetype-dev pkg-config p7zip-full

    - name: Setup PATH and ENV
      shell: nu {0}
      run: |
        let count = (git rev-list --count HEAD | into int)
        let hash = (git rev-parse --short HEAD)
        let build = $"($count).($hash)"
        let arch = "${{ inputs.arch }}"
        let rid  = $"linux-($arch)"
        [
            $"BuildVersion=($build)"
            $"Rid=($rid)"
            $"SkiaSharpName=libSkiaSharp-($env.SkiaSharpVersion)-($rid)-($build)"
            $"HarfBuzzSharpName=libHarfBuzzSharp-($env.SkiaSharpVersion)-($rid)-($build)"
            $"BuildDir=($env.GITHUB_WORKSPACE)/out/linux/($arch)/"
            $"PackageName=2ndLAB.SkiaSharp.Static.Linux.($env.SkiaSharpVersion)-($build)"
        ] | str join (char newline) | save --append $env.GITHUB_ENV
